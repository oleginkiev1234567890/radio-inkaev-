<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моє Безкоштовне Інтернет-Радіо</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #1f1f1f;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h1 {
            color: #ff0000;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        .status {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .play-btn {
            display: inline-block;
            background: #ff0000;
            color: white;
            text-decoration: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            margin: 20px 0;
        }
        .play-btn:hover {
            transform: scale(1.05);
            background: #cc0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ВЛАСНЕ РАДІО</h1>
        <div class="status">● ПРЯМИЙ ЕФІР</div>
        
        <p>Натисніть велику кнопку нижче, щоб відкрити радіоефір на YouTube:</p>
        
        <a href="https://youtube.com" target="_blank" class="play-btn">
            ▶️ СЛУХАТИ РАДІО
        </a>

        <div class="footer">
            <p>Джерело звуку: Nokia через OBS Studio. Без обмежень кількості слухачів.</p>
        </div>
    </div>

</body>
</html>
