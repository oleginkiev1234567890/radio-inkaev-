<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моє Безкоштовне Інтернет-Радіо</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #1f1f1f;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h1 {
            color: #ff0000;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        .status {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .video-responsive {
            overflow: hidden;
            padding-bottom: 56.25%;
            position: relative;
            height: 0;
            border-radius: 12px;
        }
        .video-responsive iframe {
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            position: absolute;
            border: 0;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ВЛАСНЕ РАДІО</h1>
        <div class="status">● ПРЯМИЙ ЕФІР</div>
        
        <div class="video-responsive">
            <iframe 
                src="https://youtube.com" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="footer">
            <p>Джерело звуку: Nokia через OBS Studio. Без обмежень кількості слухачів.</p>
        </div>
    </div>

</body>
</html>
